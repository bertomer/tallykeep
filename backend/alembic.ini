[alembic]
script_location = tallykeep/migrations
prepend_sys_path = .
version_path_separator = os

# The runtime URL is injected by tallykeep/migrations/env.py via TALLYKEEP_DATABASE_URL.
# Leaving sqlalchemy.url empty here ensures alembic does not silently fall back to a
# hardcoded value.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
