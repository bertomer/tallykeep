<!--
  Title: Mobile — Add Holding picker (bottom sheet open over Home empty)
  Status: validated (Rémy greenlight 2026-05-13 after the design pass —
                     real Holding-type icons from brand/identity/, locked
                     copy from next_iteration.md, filled-primary + button,
                     2 px verdigris top-indicator on active nav, hero
                     amount in Manrope tabular-nums)
  Date last touched: 2026-05-13
  Replaces: nothing on disk; the design-tool prototype
    "Holdings Home _standalone_.html" is archive material once this
    validates (1.4 MB bundle, not a page-per-file mockup).

  Design notes:
  - Page-per-file convention (UI/mockups/README.md): this file shows ONE
    state — Home empty content visible (scrimmed) plus the Add-Holding
    bottom sheet open over it. The base Home empty is
    mobile_home_empty.html.
  - Row layout (single column). The cards-variant from the earlier
    design-tool prototype is dropped: 4 options earn rows, not a
    2x2 grid — banking-grade single-column read, no eye-darting,
    description text never crops.
  - Row order: Account → Purse → Strongbox → Vault. Custody-progression
    / lifecycle order (hot to cold, least sovereign to most sovereign).
    Tells the user-money-flow story: where the money typically starts
    → daily wallet → short-term cold → long-term ceremonial.
  - Per-row color stripe: 4px in --color-holding-{type} on the left
    edge of the icon's bordered square. Same convention will carry to
    populated Holdings list rows.
  - Icons are placeholder inline SVGs. brand/identity/ has no Holding-
    type icons yet; proper iconography is a brand-pass concern. The
    2px colored border around each icon (per the matching --color-
    holding-* token) carries the type identity until icons land.
  - No "Recommended" pill in this iteration. The pill requires the
    managed-Purse capability check, which lands in the Capacitor-wrap
    iteration together with the consumer surface. In dev-phase
    browser the honest gate is the absence of the affordance.
  - Account row remains visible in the picker but its target is a
    one-screen "Add Account ships next iteration" stub
    (mobile_add_holding_account_stub.html). Keeping the IA honest
    about what's coming costs one nav dead-end and avoids
    re-explaining a missing tile.
  - Copy verbatim from next_iteration.md "Add Holding (descriptor-
    based)" iteration block.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Add Holding picker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  /* phone-screen comes from shell.css (position: absolute; inset: 0;
     display: flex; flex-direction: column; overflow: hidden) — DO NOT
     override `position` here, or the scrim and sheet lose their
     positioning context and the home content collapses out of view.
     Earlier draft made that mistake; this rule is intentionally empty. */

  /* ---------- App bar (same as Home empty) ---------- */
  .app-bar {
    height: var(--mobile-app-bar);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 var(--space-4);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }
  .app-bar svg.wordmark-icony { width: 120px; height: auto; display: block; }

  /* ---------- Hero (same as Home empty) ---------- */
  .hero {
    flex-shrink: 0;
    padding: var(--space-5) var(--space-4) var(--space-4);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--space-2);
  }
  .hero .label-line {
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: var(--font-weight-semibold);
  }
  .amount-line { display: flex; align-items: baseline; gap: var(--space-3); }
  .amount {
    font-family: var(--font-sans);
    font-size: 36px;
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .unit-label {
    font-size: var(--font-size-md);
    color: var(--color-text-muted);
    font-weight: var(--font-weight-medium);
    line-height: 1;
  }
  .unit-toggle {
    background: transparent; border: 0;
    padding: 0 0 0 2px; margin: 0;
    font-size: 0.7em; vertical-align: super; line-height: 1;
    color: var(--color-text-muted);
    cursor: pointer; font-family: inherit;
  }
  .show-fiat-link {
    background: transparent; border: 0; padding: 0;
    color: var(--color-text-dim); font-size: var(--font-size-xs);
    cursor: pointer; margin-top: var(--space-1);
  }

  /* ---------- Section head + empty-card (same as Home empty) ---------- */
  .section-head {
    padding: var(--space-3) var(--space-4) var(--space-2);
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .section-head .title {
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .section-head .add-btn {
    width: 28px; height: 28px;
    border-radius: var(--radius-md);
    border: 0;
    background: var(--color-primary); color: var(--color-on-primary);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .section-head .add-btn:hover { background: var(--color-primary-strong); }
  .section-head .add-btn svg { width: 14px; height: 14px; }
  .list-card-empty {
    margin: 0 var(--space-4) var(--space-3);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-5) var(--space-4);
    text-align: center;
    font-size: var(--font-size-sm);
    color: var(--color-text-dim);
  }

  .scroll-area { flex: 1; overflow-y: auto; }

  /* ---------- Bottom nav (same as Home empty) ---------- */
  .bottom-nav {
    height: var(--mobile-bottom-nav);
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
  }
  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    padding: var(--space-2) 0;
    font-size: 10px;
    color: var(--color-text-dim);
    background: transparent; border: 0; cursor: pointer;
  }
  .nav-item .nav-ico { width: 22px; height: 22px; color: currentColor; }
  .nav-item.active {
    color: var(--color-primary-strong);
    font-weight: var(--font-weight-semibold);
    position: relative;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--color-primary);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .nav-item.disabled { color: var(--color-text-dim); opacity: 0.4; cursor: not-allowed; }
  .nav-item.enabled-inactive { color: var(--color-text-muted); }

  /* ---------- Scrim (over everything behind the sheet) ---------- */
  .scrim {
    position: absolute;
    inset: 0;
    background: var(--color-overlay);
    z-index: 20;
    animation: fade-in 0.15s ease;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* ---------- Bottom sheet ---------- */
  .sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--color-surface);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: var(--space-2) var(--space-4) var(--space-5);
    z-index: 21;
    display: flex;
    flex-direction: column;
    max-height: 88%;
    animation: slide-up 0.22s ease;
    box-shadow: 0 -8px 24px rgba(26, 26, 26, 0.08);
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 38px; height: 4px;
    background: var(--color-border-strong);
    border-radius: var(--radius-pill);
    margin: var(--space-2) auto var(--space-4);
    flex-shrink: 0;
  }
  .sheet-head { flex-shrink: 0; margin-bottom: var(--space-4); }
  .sheet-head h2 {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    margin: 0 0 var(--space-1);
    letter-spacing: -0.01em;
  }
  .sheet-head .sheet-sub {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    line-height: var(--line-height-default);
    margin: 0;
  }

  /* ---------- Option rows ---------- */
  .add-options {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }
  .add-option {
    display: grid;
    grid-template-columns: 44px 1fr 16px;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    background: var(--color-surface);
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    color: var(--color-text);
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.12s ease;
  }
  .add-option:hover {
    background: var(--color-surface-raised);
    border-color: var(--color-border-strong);
  }
  .add-option:active { transform: scale(0.99); }

  .ao-icon-wrap {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--color-surface);
    border: 2px solid var(--ao-border, var(--color-border));
    border-radius: var(--radius-md);
    flex-shrink: 0;
  }
  .ao-icon-wrap svg {
    width: 32px; height: 32px;
    display: block;
  }

  .ao-text { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .ao-name {
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-semibold);
    line-height: var(--line-height-tight);
    color: var(--color-text);
  }
  .ao-desc {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    line-height: 1.4;
  }
  .ao-arrow {
    color: var(--color-text-dim);
    display: inline-flex;
    align-items: center;
  }
  .ao-arrow svg { width: 16px; height: 16px; }

  /* Per-row token bindings — `--ao-border` is consumed by .ao-icon-wrap */
  .add-option.account   { --ao-border: var(--color-holding-account); }
  .add-option.purse     { --ao-border: var(--color-holding-purse); }
  .add-option.strongbox { --ao-border: var(--color-holding-strongbox); }
  .add-option.vault     { --ao-border: var(--color-holding-vault); }

  /* ---------- Cancel ---------- */
  /* Cancel — secondary surface, findable but not CTA-prominent.
     Earlier draft used --color-border + --color-text-muted on a
     transparent bg; the button read as flush with the sheet
     surface. Bumped 2026-05-13 to --color-border-strong (one step
     deeper) and --color-text (full ink). Sits clearly below the
     picker rows visually; not pushy. Swipe-down on the grab-handle
     and tap-outside (on the scrim) also dismiss the sheet. */
  .sheet-cancel {
    margin-top: var(--space-4);
    width: 100%;
    padding: var(--space-3) var(--space-4);
    background: transparent;
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
    cursor: pointer;
  }
  .sheet-cancel:hover { background: var(--color-bg); }
</style>
</head>
