<!--
  Title: Mobile — Add Purse · step 4 · Success (watch-only / imported)
  Status: validated  (Rémy greenlight 2026-05-13 closing the
                      Purse-wizard design pass)
  Date last touched: 2026-05-13
  Replaces: nothing on disk.

  Design notes:
  - Step 4 of the wizard. Step counter reads "STEP 4 OF 4".
  - Watch-only / imported variant. The user pasted a descriptor at
    step 1; backend created the Holding and kicked off the chain
    scan. This screen acknowledges Holding registration ONLY —
    not balance load. Gauntlet 4 (confirmation honesty) requires
    that distinction: the Holding is created (backend confirmed),
    but the balance is still scanning and may take seconds-to-
    minutes depending on chain history.
  - Layout: centred. Success indicator (green check in a circle,
    from shell.css `.success-indicator.lg` primitive), heading,
    body copy, scan-status hint with subtle spinner, "Done" CTA.
  - "Done" CTA returns to Home. On Home, the newly created Purse
    appears in the Holdings list with a "Scanning…" status
    indicator inline (per the populated-home mockup convention).
    When the scan completes, the row updates to show the balance.
  - No auto-redirect on this screen. User-driven dismissal. The
    user can dwell here while the scan progresses if they want
    (rare — most will tap Done immediately).
  - No "scan more addresses" affordance — gap-limit / rescan is a
    Holding Detail / Settings feature, scoped out of the wizard.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Add Purse · 3 of 3 · Success (imported)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  .phone-screen { background: var(--color-bg); }

  .app-bar {
    height: var(--mobile-app-bar);
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    align-items: center;
    padding: 0 var(--space-2);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }
  /* No back-chevron on the success step — the only path forward is
     "Done". Production hides the back-button slot. */
  .app-bar .placeholder { width: 44px; }
  .step-counter {
    text-align: center;
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .scroll-area {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .success-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-7) var(--space-5);
    gap: var(--space-3);
    text-align: center;
  }
  .success-heading {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    line-height: var(--line-height-tight);
    margin: var(--space-3) 0 0;
  }
  .success-sub {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    line-height: var(--line-height-default);
    max-width: 280px;
    margin: 0;
  }
  .scan-row {
    margin-top: var(--space-4);
    padding: var(--space-3) var(--space-4);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-left: 4px solid var(--color-holding-purse);
    border-radius: var(--radius-md);
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
    font-size: var(--font-size-sm);
    color: var(--color-text);
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .scan-row .label { font-weight: var(--font-weight-semibold); }
  .scan-row .hint { color: var(--color-text-muted); }

  /* ---------- Wizard footer ---------- */
  .wizard-footer {
    flex-shrink: 0;
    padding: var(--space-3) var(--space-4) var(--space-4);
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
  }
  .wizard-cta {
    width: 100%;
    padding: var(--space-3) var(--space-4);
    background: var(--color-primary);
    color: var(--color-on-primary);
    border: 0;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-semibold);
    cursor: pointer;
  }
  .wizard-cta:hover { background: var(--color-primary-strong); }
</style>
</head>
<body>

<div class="mockup-meta">
  <strong>Mobile — Add Purse · 3 of 3 · Success (imported / watch-only)</strong> ·
  <span class="status-validated">validated</span> ·
  2026-05-13 · 360×800
</div>

<div class="phone-frame">
  <div class="phone-screen">

    <div class="app-bar">
      <div class="placeholder"></div>
      <div class="step-counter">Step 3 of 3</div>
      <div class="placeholder"></div>
    </div>

    <div class="scroll-area">
      <div class="success-body">

        <div class="success-indicator lg" aria-hidden="true">✓</div>

        <h1 class="success-heading">Purse added</h1>
        <p class="success-sub">
          We're scanning the chain to load this Purse's balance and
          history. It usually takes a few seconds.
        </p>

        <div class="scan-row" role="status">
          <div class="spinner" aria-hidden="true"></div>
          <span class="label">Scanning…</span>
          <span class="hint">balance will appear on Home shortly</span>
        </div>

      </div>
    </div>

    <div class="wizard-footer">
      <button class="wizard-cta" type="button">Done</button>
    </div>

  </div>
</div>

</body>
</html>
