<style>
  .phone-screen { padding-top: var(--mobile-safe-top); padding-bottom: var(--mobile-safe-bottom); background: var(--color-bg); }

  .app-bar { height: var(--mobile-app-bar); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-2); background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
  .app-bar-back { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: 0; cursor: pointer; padding: 0; color: var(--color-text); }
  .app-bar-back svg { width: 24px; height: 24px; }
  .app-bar-title { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-text); flex: 1; text-align: center; margin: 0 -44px 0 0; }
  .app-bar-gear { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: 0; cursor: pointer; padding: 0; color: var(--color-text-muted); }
  .app-bar-gear svg { width: 24px; height: 24px; }

  .tab-strip { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
  .tab-btn { padding: var(--space-3) 0; font-size: var(--font-size-base); font-weight: var(--font-weight-medium); background: transparent; border: 0; cursor: pointer; color: var(--color-text-dim); font-family: inherit; position: relative; }
  .tab-btn.active { color: var(--color-primary-strong); font-weight: var(--font-weight-semibold); }
  .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 25%; right: 25%; height: 2px; background: var(--color-primary); border-radius: var(--radius-sm) var(--radius-sm) 0 0; }

  .scroll-area { flex: 1; overflow-y: auto; padding: var(--space-7) var(--space-4) var(--space-4); }

  /* Empty-state panel */
  .empty-panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-6) var(--space-4); text-align: center; display: flex; flex-direction: column; align-items: center; gap: var(--space-3); }
  .empty-panel svg { width: 40px; height: 40px; color: var(--color-success); }
  .empty-panel .empty-title { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold); color: var(--color-text); }
  .empty-panel .empty-body { font-size: var(--font-size-sm); color: var(--color-text-muted); line-height: var(--line-height-default); max-width: 240px; }

  .bottom-nav { height: var(--mobile-bottom-nav); flex-shrink: 0; display: grid; grid-template-columns: repeat(3, 1fr); background: var(--color-surface); border-top: 1px solid var(--color-border); }
  .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: var(--space-2) 0; font-size: 10px; color: var(--color-text-dim); background: transparent; border: 0; cursor: pointer; position: relative; }
  .nav-item .nav-ico { width: 22px; height: 22px; color: currentColor; }
  .nav-item.active { color: var(--color-primary-strong); font-weight: var(--font-weight-semibold); }
  .nav-item.active::before { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; background: var(--color-primary); border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
  .nav-item.enabled-inactive { color: var(--color-text-muted); }
  .nav-bell-wrap { position: relative; display: inline-block; width: 22px; height: 22px; }
