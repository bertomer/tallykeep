<!--
  Title: Mobile — Vault detail · Operations tab (connection error)
  Status: validated  (Rémy greenlight 2026-05-22 closing the Vault-detail-page design pass)
  Date last touched: 2026-05-22
  Replaces: nothing on disk; chain-side cross-type analogue of
            mobile_strongbox_detail_connection_error.html for
            Vault.

  Design notes:
  - Same connection-error pattern as Strongbox / Purse.
    Connection state on Vault is also
    `system.chain.connection_state_changed` (bitcoind RPC/ZMQ
    health). Per-type lock from the Account-detail iteration:
    same UI affordance, same chain meaning.
  - **Two surfaces communicate the error state:**
      1. Persistent red dot in the status card with
         "Connection lost · Last seen N min ago".
      2. Transient slide-in toast at the top of the scroll
         area, just below the app bar. Slides down on the
         transition into the error state, auto-dismisses
         after ~5 seconds, slides back down on each failed
         retry attempt, manual dismiss via the ×.
  - **Lockup bar renders the cached state without any
    error decoration.** Last-known facts are still facts;
    the bar's reading is "what we knew at the last good
    sync". The status card's "Last seen" is the freshness
    signal.
  - **Hero shows last-known balance.** Action row stays
    rendered (both already greyed for Vault per the
    deferred-Send + deferred-Receive posture).
  - **Toast anatomy.** Same as Strongbox / Purse.

  Sample data:
  - Display name: "Family multisig"
  - Connection: unreachable, last seen 8 min ago.
  - Cached lockup bar from the CSV mixed Vault snapshot.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Vault detail · Operations (connection error)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  .phone-screen { background: var(--color-bg); }
  .app-bar { height: var(--mobile-app-bar); flex-shrink: 0; display: grid; grid-template-columns: 44px 1fr 44px; align-items: center; padding: 0 var(--space-2); background: var(--color-surface); border-bottom: 1px solid var(--color-border); position: relative; z-index: 2; }
  .app-bar .back-btn { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: 0; border-radius: var(--radius-md); color: var(--color-text); cursor: pointer; justify-self: start; margin-left: var(--space-2); }
  .app-bar .back-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .app-bar-title { text-align: center; font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); color: var(--color-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scroll-area { flex: 1; overflow-y: auto; position: relative; }
  .connection-toast { margin: var(--space-3) var(--space-4) 0; background: var(--color-danger-soft); border: 1px solid var(--color-danger-border); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); box-shadow: var(--shadow-sm); }
  .toast-row { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); }
  .toast-title { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-danger-text-on-soft); }
  .toast-close { background: transparent; border: 0; padding: 0; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; color: var(--color-danger-text-on-soft); cursor: pointer; border-radius: var(--radius-sm); }
  .toast-close svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .toast-retry { align-self: flex-start; background: var(--color-surface); border: 1px solid var(--color-danger-border); border-radius: var(--radius-pill); padding: var(--space-1) var(--space-3); font-family: inherit; font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); color: var(--color-danger-text-on-soft); cursor: pointer; }
  .status-card { margin: var(--space-3) var(--space-4) 0; background: var(--color-surface); border: 1px solid var(--color-border); border-left: 4px solid var(--color-holding-vault); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); display: flex; flex-direction: column; gap: 2px; cursor: pointer; text-align: left; width: calc(100% - var(--space-4) * 2); font-family: inherit; }
  .status-mode { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text); }
  .status-line { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--font-size-xs); color: var(--color-text-muted); line-height: 1.4; }
  .status-sep { color: var(--color-text-dim); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .status-dot--unreachable { background: var(--color-danger); }
  .status-state { color: var(--color-text); font-weight: var(--font-weight-medium); }
  .lockup-card { margin: var(--space-3) var(--space-4) 0; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); }
  .lockup-bar { display: flex; height: 26px; border-radius: var(--radius-sm); overflow: hidden; gap: 2px; }
  .lockup-seg { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: var(--font-weight-semibold); }
  .lockup-seg--available { background: #c0dd97; color: #173404; }
  .lockup-seg--sooner { background: #b4b2a9; color: #2c2c2a; }
  .lockup-seg--later { background: #5f5e5a; color: #f1efe8; }
  .lockup-legend { display: flex; margin-top: var(--space-2); font-size: var(--font-size-xs); color: var(--color-text-muted); line-height: 1.3; }
  .lockup-legend .lockup-label { display: inline-flex; align-items: center; gap: 4px; }
  .lockup-legend svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .detail-hero { padding: var(--space-4) var(--space-4) var(--space-3); display: flex; flex-direction: column; gap: var(--space-2); }
  .hero-amount-line { display: flex; align-items: baseline; gap: var(--space-2); }
  .hero-amount { font-family: var(--font-sans); font-size: 36px; font-weight: var(--font-weight-semibold); color: var(--color-text); line-height: 1; font-variant-numeric: tabular-nums; }
  .hero-unit-label { font-size: var(--font-size-md); color: var(--color-text-muted); font-weight: var(--font-weight-medium); line-height: 1; }
  .unit-toggle { background: transparent; border: 0; padding: 0 0 0 2px; margin: 0; font-size: 0.7em; vertical-align: super; line-height: 1; color: var(--color-text-muted); cursor: pointer; font-family: inherit; }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); padding: var(--space-2) var(--space-4) var(--space-4); }
  .action-btn { display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2); padding: var(--space-3) var(--space-4); background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-family: inherit; font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text-dim); cursor: help; opacity: 0.65; }
  .action-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tab-strip { display: grid; grid-template-columns: 1fr 1fr; position: sticky; top: 0; z-index: 2; background: var(--color-bg); border-top: 1px solid var(--color-border); border-bottom: 1px solid var(--color-border); }
  .tab { padding: var(--space-3) 0; background: transparent; border: 0; font-family: inherit; font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text-muted); cursor: pointer; position: relative; }
  .tab--active { color: var(--color-text); font-weight: var(--font-weight-semibold); }
  .tab--active::after { content: ''; position: absolute; left: 12%; right: 12%; bottom: -1px; height: 2px; background: var(--color-primary); border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
  .activity-list { list-style: none; margin: 0; padding: 0; background: var(--color-surface); }
  .activity-entry { display: grid; grid-template-columns: 1fr auto; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border); }
  .activity-entry:last-child { border-bottom: 0; }
  .activity-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .activity-title { font-size: var(--font-size-sm); color: var(--color-text); font-weight: var(--font-weight-medium); }
  .activity-time { font-size: var(--font-size-xs); color: var(--color-text-muted); }
  .activity-amount { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text); font-variant-numeric: tabular-nums; white-space: nowrap; align-self: center; text-align: right; }
  .activity-amount--positive { color: var(--color-success-text-on-soft); }
  .activity-amount .unit { color: var(--color-text-dim); font-size: 10px; margin-left: var(--space-1); font-weight: var(--font-weight-normal); }
  .bottom-nav { height: var(--mobile-bottom-nav); flex-shrink: 0; display: grid; grid-template-columns: repeat(4, 1fr); background: var(--color-surface); border-top: 1px solid var(--color-border); }
  .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: var(--space-2) 0; font-size: 10px; color: var(--color-text-dim); background: transparent; border: 0; cursor: pointer; }
  .nav-item .nav-ico { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-item.active { color: var(--color-primary-strong); font-weight: var(--font-weight-semibold); position: relative; }
  .nav-item.active::before { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; background: var(--color-primary); border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
  .nav-item.enabled-inactive { color: var(--color-text-muted); }
  .nav-item.disabled { color: var(--color-text-dim); opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="mockup-meta"><strong>Mobile — Vault detail · Operations (connection error)</strong> · <span class="status-validated">validated</span> · 2026-05-22 · 360×800</div>
<div class="phone-frame">
