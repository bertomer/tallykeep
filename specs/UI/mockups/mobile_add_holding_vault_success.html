<!--
  Title: Mobile — Add Vault · step 3 · Success
  Status: validated  (Rémy greenlight 2026-05-15 closing the
                       Vault-wizard design pass; ADR-0010 β v1 success state, agnostic to which
                    timelock kind the parseback validated.)
  Date last touched: 2026-05-15
  Replaces: nothing on disk. Derives from
            mobile_add_holding_strongbox_success.html — same
            success-step shape (watch-only descriptor registered;
            chain scan starts in the background).

  Design notes:
  - Step counter "STEP 3 OF 3".
  - Same shape as Strongbox / Purse-imported success. Centred
    success indicator + heading + body copy + scan-row + Done.
  - Vault-coloured stripe (--color-holding-vault) on the scan
    row, matching the per-type-colour pattern used elsewhere
    (picker accent, name-preview stripe at parseback, populated
    home row left-edge).
  - Body copy is shape-agnostic: applies to CLTV and CSV cases
    alike. The Vault detail page renders the appropriate
    unlock-countdown UI per shape (wallet-wide for CLTV;
    per-UTXO for CSV).
  - "Done" returns to Home; the new Vault appears in the
    Holdings list with a "Scanning…" status indicator inline
    until the scan completes.
  - No "Vault spending is locked" disclosure here. Send is
    deferred per ADR-0010, but the Vault detail page is where
    the user discovers the greyed-out Send affordance with its
    own explanation. Surfacing the deferred-spending message
    at success would frontload deferral language at the wrong
    moment (the user just successfully created a Holding — let
    them feel that).
  - No "scan more addresses" affordance — gap-limit / rescan is
    a detail / Settings feature, scoped out of the wizard.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Add Vault · 3 of 3 · Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  .phone-screen { background: var(--color-bg); }

  .app-bar {
    height: var(--mobile-app-bar);
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    align-items: center;
    padding: 0 var(--space-2);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }
  /* No back-chevron on the success step. */
  .app-bar .placeholder { width: 44px; }
  .step-counter {
    text-align: center;
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1;
  }

  .scroll-area {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .success-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-7) var(--space-5);
    gap: var(--space-3);
    text-align: center;
  }
  .success-heading {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    line-height: var(--line-height-tight);
    margin: var(--space-3) 0 0;
  }
  .success-sub {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    line-height: var(--line-height-default);
    max-width: 280px;
    margin: 0;
  }
  .scan-row {
    margin-top: var(--space-4);
    padding: var(--space-3) var(--space-4);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-left: 4px solid var(--color-holding-vault);
    border-radius: var(--radius-md);
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
    font-size: var(--font-size-sm);
    color: var(--color-text);
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .scan-row .label { font-weight: var(--font-weight-semibold); }
  .scan-row .hint { color: var(--color-text-muted); }

  .wizard-footer {
    flex-shrink: 0;
    padding: var(--space-3) var(--space-4) var(--space-4);
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
  }
  .wizard-cta {
    width: 100%;
    padding: var(--space-3) var(--space-4);
    background: var(--color-primary);
    color: var(--color-on-primary);
    border: 0;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-semibold);
    cursor: pointer;
  }
  .wizard-cta:hover { background: var(--color-primary-strong); }
</style>
</head>
<body>

<div class="mockup-meta">
  <strong>Mobile — Add Vault · 3 of 3 · Success</strong> ·
  <span class="status-validated">validated</span> ·
  2026-05-15 · 360×800
</div>

<div class="phone-frame">
  <div class="phone-screen">

    <div class="app-bar">
      <div class="placeholder"></div>
      <div class="step-counter">Step 3 of 3</div>
      <div class="placeholder"></div>
    </div>

    <div class="scroll-area">
      <div class="success-body">

        <div class="success-indicator lg" aria-hidden="true">✓</div>

        <h1 class="success-heading">Vault added</h1>
        <p class="success-sub">
          We're scanning the chain to load this Vault's balance
          and history. It usually takes a few seconds.
        </p>

        <div class="scan-row" role="status">
          <div class="spinner" aria-hidden="true"></div>
          <span class="label">Scanning…</span>
          <span class="hint">balance will appear on Home shortly</span>
        </div>

      </div>
    </div>

    <div class="wizard-footer">
      <button class="wizard-cta" type="button">Done</button>
    </div>

  </div>
</div>

</body>
</html>
