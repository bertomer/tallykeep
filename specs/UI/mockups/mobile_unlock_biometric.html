<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Unlock (biometric)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  .phone-screen {
    padding-top: var(--mobile-safe-top);
    padding-bottom: var(--mobile-safe-bottom);
  }

  .brand-strip {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-5) var(--space-4) var(--space-4);
  }
  .brand-strip svg.wordmark-icony { width: 280px; height: auto; display: block; }

  /* Unlock body */
  .unlock-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-5) var(--space-4);
    text-align: center;
    gap: var(--space-3);
  }
  .bio-glyph {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--color-primary-soft);
    border: 2px solid var(--color-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-primary-strong);
  }
  .bio-glyph svg {
    width: 56px;
    height: 56px;
  }
  .unlock-body .heading {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    margin-top: var(--space-3);
  }
  .unlock-body .hint {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    line-height: var(--line-height-default);
    max-width: 260px;
  }
  .unlock-body .alt-action {
    margin-top: var(--space-5);
    background: transparent;
    border: 0;
    color: var(--color-primary-strong);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    padding: var(--space-2) var(--space-4);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* Bottom status — small "still connected" anchor */
  .connection-status {
    flex-shrink: 0;
    padding: 0 var(--space-4) var(--space-4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-success);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="mockup-meta">
  <strong>Mobile — Unlock (biometric default)</strong> ·
  <span class="status-validated">validated</span> ·
  2026-05-10 · 360×800
</div>

<div class="phone-frame">
  <div class="phone-screen">

    <!-- Brand strip — same wordmark-icony, smaller breathing -->
    <div class="brand-strip">
      <!-- viewBox tightened to 0 0 425 145 — see Onboarding 01 note. -->
      <svg class="wordmark-icony" viewBox="0 0 450 145" xmlns="http://www.w3.org/2000/svg" aria-label="tallykeep" role="img">
        <text x="0" y="92" font-family="Manrope, system-ui, sans-serif" font-weight="600" font-size="92" letter-spacing="-2" class="mark-text">tall</text>
        <svg x="143" y="42" width="76" height="84" viewBox="36.43 27.79 131.9 146.43">
          <defs>
            <clipPath id="wm-stock-clip"><path d="M 168.33 42.19 L 54.27 174.22 L 36.43 139.77 L 54.47 118.86 L 65.07 128.02 L 151.67 27.81 Z"/></clipPath>
            <clipPath id="wm-foil-clip"><polygon points="40.68,42.21 79.68,87.21 96.32,72.79 57.32,27.79"/></clipPath>
          </defs>
          <path d="M 168.33 42.19 L 54.27 174.22 L 36.43 139.77 L 54.47 118.86 L 65.07 128.02 L 151.67 27.81 Z" class="mark-wood"/>
          <polygon points="40.68,42.21 79.68,87.21 96.32,72.79 57.32,27.79" class="mark-wood"/>
          <g class="mark-grain" stroke-width="1.4" stroke-linecap="butt" opacity="0.6">
            <line x1="163.79" y1="38.27" x2="46.07" y2="174.53" clip-path="url(#wm-stock-clip)"/>
            <line x1="156.22" y1="31.73" x2="38.50" y2="167.99" clip-path="url(#wm-stock-clip)"/>
            <line x1="45.22"  y1="38.27" x2="84.52" y2="83.64"  clip-path="url(#wm-foil-clip)"/>
            <line x1="52.78"  y1="31.73" x2="92.08" y2="77.09"  clip-path="url(#wm-foil-clip)"/>
          </g>
          <circle cx="53.76" cy="147.31" r="2.8" class="mark-carving"/>
          <polygon points="-3,12 3,12 2,5 -2,5"     class="mark-carving" transform="translate(147 50) rotate(130.82)"/>
          <polygon points="-4,12 4,12 2,4 -2,4"     class="mark-carving" transform="translate(140 58) rotate(130.82)"/>
          <polygon points="-3,12 3,12 2,5 -2,5"     class="mark-carving" transform="translate(133 66) rotate(130.82)"/>
          <polygon points="-3,-12 3,-12 2,-5 -2,-5" class="mark-carving" transform="translate(62 50)  rotate(49.18)"/>
          <polygon points="-4,-12 4,-12 2,-4 -2,-4" class="mark-carving" transform="translate(69 58)  rotate(49.18)"/>
          <polygon points="-3,-12 3,-12 2,-5 -2,-5" class="mark-carving" transform="translate(76 66)  rotate(49.18)"/>
        </svg>
        <text x="228" y="92" font-family="Manrope, system-ui, sans-serif" font-weight="600" font-size="92" letter-spacing="-2" class="mark-text">keep</text>
      </svg>
    </div>

    <!-- Unlock body -->
    <div class="unlock-body">
      <div class="bio-glyph" aria-hidden="true">
        <!-- Generic biometric glyph — abstract concentric arcs evoking
             a fingerprint without committing to face vs finger; the
             OS-native prompt (Face ID / Touch ID / Android biometric)
             will overlay when biometric fires. -->
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M 8 14 Q 16 6 24 14"/>
          <path d="M 9 18 Q 16 11 23 18"/>
          <path d="M 10 22 Q 16 16 22 22"/>
          <path d="M 12 26 Q 16 22 20 26"/>
        </svg>
      </div>
      <div class="heading">Unlock TallyKeep</div>
      <div class="hint">
        Use your biometric to open the app. Look at your phone or
        place your finger on the sensor.
      </div>

      <button class="alt-action">Use passphrase instead</button>
    </div>

    <!-- Connection status -->
    <div class="connection-status">
      <span class="status-dot" aria-hidden="true"></span>
      Connected · Rémy's home server
    </div>

  </div>
</div>

</body>
</html>
