<!--
  Title: Mobile — Home (populated, Security Health tab with critical badge "2")
  Status: validated (Security-health-system v1 design-pass; Rémy greenlight
                   2026-05-24)
  Date last touched: 2026-05-24
  Replaces: nothing. New mockup.

  Design note: identical chrome to mobile_home_populated.html. The
  only delta is the Security Health bottom-nav tab now carries a
  red badge "2" on the bell glyph. Per ADR-0019: badge counts
  CRITICAL-severity items only (warnings don't propagate). Sample
  scenario: user has an unbacked-up ON_DEVICE_TK_GENERATED Purse seed
  AND a hypothetical second critical item (e.g., a second Purse —
  future state — or hosted-tier credentials backup when hosted tier
  ships). For v1 the realistic max is 1 (single seed_backup item per
  Purse, single user); 2 demonstrates the layout for multi-critical.

  Badge visual: red pill (background #b8351b), white text, min-width
  16px, 1.5px white border separating it from the bell glyph.
  Positioned top-right of the bell (translate from icon top-right
  corner). Tab label stays "Security".
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Home (populated · 2 critical)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">

<style>
  .phone-screen { padding-top: var(--mobile-safe-top); padding-bottom: var(--mobile-safe-bottom); background: var(--color-bg); }

  .app-bar { height: var(--mobile-app-bar); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-4); background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
  .app-bar svg.wordmark-icony { width: 120px; height: auto; display: block; }
  .app-bar-gear { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: 0; cursor: pointer; padding: 0; color: var(--color-text-muted); margin-right: -10px; }
  .app-bar-gear svg { width: 24px; height: 24px; }

  .hero { flex-shrink: 0; padding: var(--space-5) var(--space-4) var(--space-4); background: var(--color-surface); border-bottom: 1px solid var(--color-border); display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-2); }
  .hero .label-line { font-size: var(--font-size-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: var(--font-weight-semibold); }
  .amount-line { display: flex; align-items: baseline; gap: var(--space-3); }
  .amount { font-family: var(--font-sans); font-size: 36px; font-weight: var(--font-weight-semibold); color: var(--color-text); line-height: 1; font-variant-numeric: tabular-nums; }
  .unit-label { font-size: var(--font-size-md); color: var(--color-text-muted); font-weight: var(--font-weight-medium); line-height: 1; }
  .unit-toggle { background: transparent; border: 0; padding: 0 0 0 2px; margin: 0; font-size: 0.7em; vertical-align: super; line-height: 1; color: var(--color-text-muted); cursor: pointer; font-family: inherit; }
  .show-fiat-link { background: transparent; border: 0; padding: 0; color: var(--color-text-dim); font-size: var(--font-size-xs); cursor: pointer; margin-top: var(--space-1); }

  .section-head { padding: var(--space-3) var(--space-4) var(--space-2); display: flex; align-items: baseline; justify-content: space-between; }
  .section-head .title { font-size: var(--font-size-xs); font-weight: var(--font-weight-semibold); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .section-head .add-btn { width: 28px; height: 28px; border-radius: var(--radius-md); border: 0; background: var(--color-primary); color: var(--color-on-primary); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .section-head .add-btn svg { width: 14px; height: 14px; }

  .holding-list { margin: 0 var(--space-4) var(--space-3); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
  .holding-row { display: grid; grid-template-columns: 4px 1fr auto; align-items: stretch; width: 100%; border: 0; border-bottom: 1px solid var(--color-border); background: transparent; padding: 0; font-family: inherit; color: inherit; text-align: left; cursor: pointer; }
  .holding-row:last-child { border-bottom: 0; }
  .holding-stripe { align-self: stretch; }
  .holding-row.account   .holding-stripe { background: var(--color-holding-account); }
  .holding-row.purse     .holding-stripe { background: var(--color-holding-purse); }
  .holding-row.strongbox .holding-stripe { background: var(--color-holding-strongbox); }
  .holding-row.vault     .holding-stripe { background: var(--color-holding-vault); }
  .holding-body { padding: var(--space-3) var(--space-4); min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .holding-name { font-size: var(--font-size-base); font-weight: var(--font-weight-semibold); color: var(--color-text); line-height: var(--line-height-tight); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .holding-meta { font-size: var(--font-size-xs); color: var(--color-text-dim); line-height: var(--line-height-tight); }
  .holding-amt { padding: var(--space-3) var(--space-4); text-align: right; font-family: var(--font-sans); font-variant-numeric: tabular-nums; font-size: var(--font-size-base); font-weight: var(--font-weight-medium); color: var(--color-text); white-space: nowrap; align-self: center; }
  .holding-amt .unit { color: var(--color-text-dim); font-size: 10px; margin-left: var(--space-1); font-family: var(--font-sans); font-weight: var(--font-weight-normal); }

  .scroll-area { flex: 1; overflow-y: auto; }

  .bottom-nav { height: var(--mobile-bottom-nav); flex-shrink: 0; display: grid; grid-template-columns: repeat(3, 1fr); background: var(--color-surface); border-top: 1px solid var(--color-border); }
  .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: var(--space-2) 0; font-size: 10px; color: var(--color-text-dim); background: transparent; border: 0; cursor: pointer; position: relative; }
  .nav-item .nav-ico { width: 22px; height: 22px; color: currentColor; }
  .nav-item.active { color: var(--color-primary-strong); font-weight: var(--font-weight-semibold); }
  .nav-item.active::before { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; background: var(--color-primary); border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
  .nav-item.enabled-inactive { color: var(--color-text-muted); }
  .nav-bell-wrap { position: relative; display: inline-block; width: 22px; height: 22px; }
  /* Red badge — per ADR-0019. Critical-count only. White border
     separates from the bell glyph (no visual collision). */
  .nav-badge {
    position: absolute;
    top: -4px;
    right: -8px;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: var(--radius-pill);
    background: var(--color-danger);
    color: #FFFFFF;
    font-size: 10px;
    font-weight: var(--font-weight-semibold);
    font-family: var(--font-sans);
    line-height: 16px;
    text-align: center;
    box-sizing: border-box;
    border: 1.5px solid var(--color-surface);
  }
</style>
</head>
