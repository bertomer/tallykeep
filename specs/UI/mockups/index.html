<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mockup Index</title>
<link rel="stylesheet" href="_shared/tokens.css">
<style>
  body {
    font-family: var(--font-sans);
    background: var(--color-bg);
    color: var(--color-text);
    margin: 0;
    padding: var(--space-6);
  }
  h1 {
    margin: 0 0 var(--space-2);
    font-size: var(--font-size-xl);
  }
  .lede {
    color: var(--color-text-muted);
    margin: 0 0 var(--space-6);
    max-width: 720px;
  }
  .filter-row {
    display: flex;
    gap: var(--space-3);
    margin-bottom: var(--space-3);
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-row:last-of-type {
    margin-bottom: var(--space-5);
  }
  .filter-label {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    min-width: 64px;
  }
  #group-filters {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
  }
  .filter-btn {
    padding: var(--space-1) var(--space-3);
    border: 1px solid var(--color-border-strong);
    background: var(--color-surface);
    border-radius: var(--radius-pill);
    cursor: pointer;
    font-size: var(--font-size-sm);
    color: var(--color-text);
  }
  .filter-btn.active {
    background: var(--color-text);
    color: var(--color-text-inverse);
    border-color: var(--color-text);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: var(--space-5);
  }
  /* Desktop-viewport groups (web admin etc.) — wider cards so the
     1328×848 desktop frame is legible in the preview. */
  .grid-desktop {
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
  }
  .section-heading {
    position: sticky;
    top: 0;
    z-index: 5;
    margin: var(--space-6) 0 var(--space-3);
    padding: var(--space-3) 0 var(--space-2);
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: baseline;
    gap: var(--space-2);
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
  }
  .section-heading:first-child {
    margin-top: 0;
  }
  .section-heading .section-count {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-normal);
    color: var(--color-text-muted);
  }
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 80ms, box-shadow 80ms;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .card-header {
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--color-border);
  }
  .card-title {
    font-weight: var(--font-weight-semibold);
    font-size: var(--font-size-base);
    margin-bottom: var(--space-1);
  }
  .card-meta {
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }
  .badge {
    display: inline-block;
    padding: 2px var(--space-2);
    font-size: 10px;
    border-radius: var(--radius-pill);
    font-weight: var(--font-weight-semibold);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge-draft     { background: var(--color-warning-soft); color: var(--color-warning); }
  .badge-review    { background: var(--color-info-soft);    color: var(--color-info); }
  .badge-validated { background: var(--color-success-soft); color: var(--color-success); }
  /*
    Preview sizing — tuned so every card shows the complete phone-screen
    including the bottom nav and any primary CTA above it.

    Each mockup body lays out as:
      padding-top  : var(--space-7) = 48px
      phone-frame  : 360 × 800 (border-box)
      padding-bot. : var(--space-7) = 48px
      sides        : var(--space-4) = 16px each
    => body content area is exactly 392 × 896. The iframe is pinned to
    that size and scaled by JS to fit the card width, and the .preview
    aspect-ratio matches so there is no spare body-background showing
    above/below the phone-frame. If you change the body padding in
    _shared/shell.css, update IFRAME_W / IFRAME_H below in lockstep.
  */
  .preview {
    width: 100%;
    aspect-ratio: 392 / 896;
    overflow: hidden;
    position: relative;
    background: #cbd5e1;
  }
  .preview-desktop {
    aspect-ratio: 1328 / 848;
  }
  .preview iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 392px;
    height: 896px;
    border: 0;
    transform-origin: top left;
    pointer-events: none;
  }
  .filename {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--color-text-dim);
  }
  .empty {
    padding: var(--space-7);
    text-align: center;
    color: var(--color-text-muted);
    background: var(--color-surface);
    border: 1px dashed var(--color-border-strong);
    border-radius: var(--radius-lg);
  }
  .empty code {
    background: var(--color-bg);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-size: var(--font-size-sm);
  }
</style>
</head>

  // Body content area for each mockup (see CSS comment above .preview).
  // Keep in lockstep with _shared/shell.css body padding + phone-frame.
  const IFRAME_W = 392;
  const IFRAME_H = 896;

  // Web admin / desktop-viewport mockups use the desktop-frame from
  // _shared/web_admin_shell.css. Body padding var(--space-5) = 24 on
  // every side; frame is 1280×800 => content area is 1328 × 848.

  const IFRAME_H_DESKTOP = 848;

  const sectionsEl = document.getElementById('sections');
  const groupFiltersEl = document.getElementById('group-filters');
  let currentStatus = 'all';
  let currentGroup = 'all';

  // Build the Section pill row. "All" first, then only the groups that
  // have at least one mockup (so we don't ship dead pills).
  function buildGroupFilters() {
    const present = new Set(mockups.map(m => m.group));
    const pills = [{ id: 'all', label: 'All' }]
      .concat(GROUPS.filter(g => present.has(g.id)));
    groupFiltersEl.innerHTML = pills.map(p => `
      <button class="filter-btn ${p.id === 'all' ? 'active' : ''}"
              data-group="${p.id}">${p.label}</button>
    `).join('');
    // Warn (in console) about entries pointing at unknown group ids so
    // the agent notices a typo without breaking the page.
    const known = new Set(GROUPS.map(g => g.id));
    for (const m of mockups) {
      if (!known.has(m.group)) {
        console.warn(`Mockup "${m.file}" has unknown group "${m.group}". ` +
                     `Add it to GROUPS, or fix the typo.`);
      }
    }
  }

  // ResizeObserver scales each iframe to fit its preview width while
  // keeping the body content area visible 1:1 (no overflow, no extra
  // body background showing below the phone-frame). Desktop-viewport
  // cards (data-viewport="desktop") use the desktop dimensions.
  const previewRO = new ResizeObserver(entries => {
    for (const e of entries) {
      const iframe = e.target.querySelector('iframe');
      if (iframe) {
        const isDesktop = e.target.dataset.viewport === 'desktop';
        const w = isDesktop ? IFRAME_W_DESKTOP : IFRAME_W;
        const h = isDesktop ? IFRAME_H_DESKTOP : IFRAME_H;
        iframe.style.width  = w + 'px';
        iframe.style.height = h + 'px';
        iframe.style.transform = `scale(${e.contentRect.width / w})`;
      }
    }
  });

  function makeCard(m) {
    const card = document.createElement('a');
    card.href = m.file;
    card.target = '_blank';
    card.className = 'card';
    const isDesktop = DESKTOP_GROUPS.has(m.group);
    const previewClass = isDesktop ? 'preview preview-desktop' : 'preview';
    const dataViewport = isDesktop ? ' data-viewport="desktop"' : '';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">
          <span class="badge badge-${m.status}">${m.status}</span>
          <span class="filename">${m.file}</span>
        </div>
      </div>
      <div class="${previewClass}"${dataViewport}>
        <iframe src="${m.file}" loading="lazy"></iframe>
      </div>`;
    return card;
  }

  function render() {
    if (mockups.length === 0) {
      sectionsEl.innerHTML = `
        <div class="empty">
          No mockups yet. Add files to <code>UI/mockups/</code> and
          list them in the <code>mockups</code> array near the top of
          <code>index.html</code>.
        </div>`;
      return;
    }

    sectionsEl.innerHTML = '';

    const matchesFilters = m =>
      (currentStatus === 'all' || m.status === currentStatus) &&
      (currentGroup  === 'all' || m.group  === currentGroup);

    let anyShown = false;
    for (const g of GROUPS) {
      if (currentGroup !== 'all' && currentGroup !== g.id) continue;
      const items = mockups.filter(m => m.group === g.id && matchesFilters(m));
      if (items.length === 0) continue;

      const heading = document.createElement('h2');
      heading.className = 'section-heading';
      heading.innerHTML = `
        <span>${g.label}</span>
        <span class="section-count">${items.length}</span>`;
      sectionsEl.appendChild(heading);

      const grid = document.createElement('div');
      grid.className = DESKTOP_GROUPS.has(g.id) ? 'grid grid-desktop' : 'grid';
      for (const m of items) {
        const card = makeCard(m);
        grid.appendChild(card);
        previewRO.observe(card.querySelector('.preview'));
      }
      sectionsEl.appendChild(grid);
      anyShown = true;
    }

    if (currentGroup === 'all') {
      const knownIds = new Set(GROUPS.map(g => g.id));
      const orphans = mockups.filter(m =>
        !knownIds.has(m.group) && matchesFilters(m));
      if (orphans.length) {
        const heading = document.createElement('h2');
        heading.className = 'section-heading';
        heading.innerHTML = `
          <span>Orphans (unknown group)</span>
          <span class="section-count">${orphans.length}</span>`;
        sectionsEl.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'grid';
        for (const m of orphans) {
          const card = makeCard(m);
          grid.appendChild(card);
          previewRO.observe(card.querySelector('.preview'));
        }
        sectionsEl.appendChild(grid);
        anyShown = true;
      }
    }

    if (!anyShown) {
      sectionsEl.innerHTML = `
        <div class="empty">No mockups match the current filters.</div>`;
    }
  }

  buildGroupFilters();
  render();

  // Status filter pills
  document.querySelectorAll('[data-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-status]').forEach(b =>
        b.classList.remove('active'));
      btn.classList.add('active');
      currentStatus = btn.dataset.status;
      render();
    });
  });

  // Group filter pills (built dynamically, so use click delegation)
  groupFiltersEl.addEventListener('click', e => {
    const btn = e.target.closest('[data-group]');
    if (!btn) return;
    groupFiltersEl.querySelectorAll('[data-group]').forEach(b =>
      b.classList.remove('active'));
    btn.classList.add('active');
    currentGroup = btn.dataset.group;
    render();
  });
</script>
</body>
</html>
