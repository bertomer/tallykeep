<!--
  Title: Mobile — Unlock (passphrase entry)
  Status: draft
  Date last touched: 2026-05-10
  Replaces: (new — added during onboarding-screen-2 review; resolves the unlock-fallback question)

  Design note: rendered when the user either (a) taps
  "Use passphrase instead" on the biometric variant, or (b) is on a
  device with no biometric capability, or (c) opted out of biometric
  during onboarding. The passphrase typed here is forwarded to the
  backend over the paired connection for validation; the phone never
  stores the passphrase. On OK, the local device credential unlocks
  and the user lands on Home. On NO, error + retry; after N failed
  attempts (sharpens during auth-layer iteration), the form
  rate-limits.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Unlock (passphrase)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  .phone-screen {
    padding-top: var(--mobile-safe-top);
    padding-bottom: var(--mobile-safe-bottom);
  }

  .brand-strip {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-5) var(--space-4) var(--space-4);
  }
  .brand-strip svg.wordmark-icony { width: 280px; height: auto; display: block; }

  /* Unlock body */
  .unlock-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: var(--space-3) var(--space-4);
    gap: var(--space-3);
  }
  .unlock-body .heading {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    text-align: center;
    margin-bottom: var(--space-2);
  }
  .unlock-body .hint {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    line-height: var(--line-height-default);
    text-align: center;
    max-width: 280px;
    align-self: center;
    margin-bottom: var(--space-4);
  }
  .passphrase-input {
    width: 100%;
    padding: var(--space-3) var(--space-4);
    font-size: var(--font-size-base);
    font-family: var(--font-mono);
    border: 1px solid var(--color-border-strong);
    border-radius: var(--radius-md);
    background: var(--color-surface);
    color: var(--color-text);
    letter-spacing: 4px;
  }
  .passphrase-input:focus {
    outline: 2px solid var(--color-border-focus);
    outline-offset: -1px;
  }
  .unlock-actions {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    margin-top: var(--space-3);
  }
  .btn-unlock {
    width: 100%;
    padding: var(--space-3) var(--space-4);
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-semibold);
    border-radius: var(--radius-md);
    border: 1px solid var(--color-primary);
    background: var(--color-primary);
    color: var(--color-on-primary);
    cursor: pointer;
  }
  .alt-action {
    background: transparent;
    border: 0;
    color: var(--color-primary-strong);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    padding: var(--space-2) var(--space-4);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    align-self: center;
  }

  /* Bottom status */
  .connection-status {
    flex-shrink: 0;
    padding: 0 var(--space-4) var(--space-4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-success);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="mockup-meta">
  <strong>Mobile — Unlock (passphrase entry)</strong> ·

  2026-05-10 · 360×800

<div class="phone-frame">

        <svg x="143" y="42" width="76" height="84" viewBox="36.43 27.79 131.9 146.43">
          <defs>
            <clipPath id="wm-stock-clip"><path d="M 168.33 42.19 L 54.27 174.22 L 36.43 139.77 L 54.47 118.86 L 65.07 128.02 L 151.67 27.81 Z"/></clipPath>

          <polygon points="40.68,42.21 79.68,87.21 96.32,72.79 57.32,27.79" class="mark-wood"/>
          <g class="mark-grain" stroke-width="1.4" stroke-linecap="butt" opacity="0.6">

            <line x1="156.22" y1="31.73" x2="38.50" y2="167.99" clip-path="url(#wm-stock-clip)"/>
            <line x1="45.22"  y1="38.27" x2="84.52" y2="83.64"  clip-path="url(#wm-foil-clip)"/>
            <line x1="52.78"  y1="31.73" x2="92.08" y2="77.09"  clip-path="url(#wm-foil-clip)"/>

          <circle cx="53.76" cy="147.31" r="2.8" class="mark-carving"/>
          <polygon points="-3,12 3,12 2,5 -2,5"     class="mark-carving" transform="translate(147 50) rotate(130.82)"/>
          <polygon points="-4,12 4,12 2,4 -2,4"     class="mark-carving" transform="translate(140 58) rotate(130.82)"/>
          <polygon points="-3,12 3,12 2,5 -2,5"     class="mark-carving" transform="translate(133 66) rotate(130.82)"/>
          <polygon points="-3,-12 3,-12 2,-5 -2,-5" class="mark-carving" transform="translate(62 50)  rotate(49.18)"/>
          <polygon points="-4,-12 4,-12 2,-4 -2,-4" class="mark-carving" transform="translate(69 58)  rotate(49.18)"/>

        </svg>
        <text x="228" y="92" font-family="Manrope, system-ui, sans-serif" font-weight="600" font-size="92" letter-spacing="-2" class="mark-text">keep</text>
      </svg>
    </div>

    <div class="unlock-body">
      <div class="heading">Enter your passphrase</div>
      <div class="hint">
        Type your TallyKeep passphrase — the same one you set for
        your server. Sent over the secure connection for verification.
      </div>

      <input type="password"
             class="passphrase-input"
             placeholder="••••••••••••"
             aria-label="TallyKeep passphrase"
             autocomplete="current-password">

      <div class="unlock-actions">
        <button class="btn-unlock">Unlock</button>
        <button class="alt-action">Use biometric instead</button>
      </div>
    </div>

    <div class="connection-status">
      <span class="status-dot" aria-hidden="true"></span>
      Connected · Rémy's home server
    </div>

  </div>
</div>

</body>
</html>
