<!--
  Title: Mobile — Home (empty)
  Status: validated (Rémy greenlight 2026-05-24 for the v1 iteration; previously validated 2026-05-10 + 2026-05-13 for the prior
                   4-tab nav version; re-touched 2026-05-24 for the
                   Security-health-system v1 iteration — 4-tab nav
                   replaced with 3-tab (Home / Security Health /
                   Activity), gear icon added top-right on the app
                   bar for Settings entry. Re-validated 2026-05-24.)
  Date last touched: 2026-05-24
  Replaces: this file's prior 4-tab nav version (Holdings + More tabs
            retired per ADR-0019).

  Design note: structural change — bottom nav from 4 tabs to 3 tabs.
  Holdings tab retired (Holdings list-card on Home is the only index
  needed). More tab retired (Settings moves to a gear icon top-right
  on the app bar — banking-app standard: Revolut, N26, Wise). At empty
  state the Security Health tab carries no badge (no items yet —
  badge is critical-count-only per ADR-0019). Activity tab stays
  enabled-inactive at zero state since the user might still tap to
  see the (empty) categorization center.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Home (empty)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  .phone-screen {
    padding-top: var(--mobile-safe-top);
    padding-bottom: var(--mobile-safe-bottom);
    background: var(--color-bg);
  }

  /* ---------- App bar (wordmark left + gear right) ---------- */
  .app-bar {
    height: var(--mobile-app-bar);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-4);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }
  .app-bar svg.wordmark-icony { width: 120px; height: auto; display: block; }
  /* Gear icon top-right — Settings entry. New chrome 2026-05-24 per ADR-0019.
     44×44 px hit target, 24 px glyph. --color-text-muted; no badge (Settings is
     configuration, not a notification surface). */
  .app-bar-gear {
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 0; cursor: pointer; padding: 0;
    color: var(--color-text-muted);
    margin-right: -10px; /* visually nudge to edge without losing hit target */
  }
  .app-bar-gear:hover { color: var(--color-text); }
  .app-bar-gear svg { width: 24px; height: 24px; }

  /* ---------- Hero — consolidated view ---------- */
  .hero {
    flex-shrink: 0;
    padding: var(--space-5) var(--space-4) var(--space-4);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    display: flex; flex-direction: column; align-items: flex-start;
    gap: var(--space-2);
  }
  .hero .label-line {
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: var(--font-weight-semibold);
  }
  .amount-line { display: flex; align-items: baseline; gap: var(--space-3); }
  .amount {
    font-family: var(--font-sans);
    font-size: 36px;
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .unit-label {
    font-size: var(--font-size-md);
    color: var(--color-text-muted);
    font-weight: var(--font-weight-medium);
    line-height: 1;
  }
  .unit-toggle {
    background: transparent; border: 0; padding: 0 0 0 2px; margin: 0;
    font-size: 0.7em; vertical-align: super; line-height: 1;
    color: var(--color-text-muted); cursor: pointer; font-family: inherit;
  }
  .unit-toggle:hover { color: var(--color-text); }
  .show-fiat-link {
    background: transparent; border: 0; padding: 0;
    color: var(--color-text-dim); font-size: var(--font-size-xs);
    cursor: pointer; margin-top: var(--space-1);
  }
  .show-fiat-link:hover { color: var(--color-text-muted); }

  /* ---------- Section header ---------- */
  .section-head {
    padding: var(--space-3) var(--space-4) var(--space-2);
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .section-head .title {
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .section-head .add-btn {
    width: 28px; height: 28px;
    border-radius: var(--radius-md); border: 0;
    background: var(--color-primary); color: var(--color-on-primary);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .section-head .add-btn:hover { background: var(--color-primary-strong); }
  .section-head .add-btn svg { width: 14px; height: 14px; }

  .list-card-empty {
    margin: 0 var(--space-4) var(--space-3);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-5) var(--space-4);
    text-align: center;
    font-size: var(--font-size-sm);
    color: var(--color-text-dim);
  }

  .scroll-area { flex: 1; overflow-y: auto; }

  /* ---------- Bottom nav — 3 tabs (was 4) per ADR-0019 ---------- */
  .bottom-nav {
    height: var(--mobile-bottom-nav);
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
  }
  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; padding: var(--space-2) 0;
    font-size: 10px; color: var(--color-text-dim);
    background: transparent; border: 0; cursor: pointer;
    position: relative;
  }
  .nav-item .nav-ico { width: 22px; height: 22px; color: currentColor; }
  .nav-item.active { color: var(--color-primary-strong); font-weight: var(--font-weight-semibold); }
  .nav-item.active::before {
    content: '';
    position: absolute; top: 0; left: 20%; right: 20%;
    height: 2px; background: var(--color-primary);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .nav-item.disabled { color: var(--color-text-dim); opacity: 0.4; cursor: not-allowed; }
  .nav-item.enabled-inactive { color: var(--color-text-muted); }
  /* Security Health tab — bell-icon glyph + (when criticals open) red
     badge. At empty Home, no items exist, no badge rendered. The
     badge variant lives in mobile_home_populated_security_critical_badge.html. */
  .nav-bell-wrap { position: relative; display: inline-block; width: 22px; height: 22px; }
</style>
</head>
<body>

</div>

</body>
</html>
