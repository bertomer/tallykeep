  Date last touched: 2026-05-13
  Replaces: nothing on disk.

  Design notes:
  - Step 4 of the wizard, generated variant. The user reached this
    state via the generate path (step 1 alt → wrote down seed →
    parse-back → labelled). Same shell as the imported variant.
  - Copy adapts: a freshly generated Purse has zero history and
    zero balance. There's nothing to scan that would reveal
    funds. The honest copy framing is "the Purse is ready,
    receive your first deposit when you're ready" rather than the
    "Scanning…" framing of the imported variant.
  - We DO still call /holdings/purse on the backend to register
    the descriptor and trigger a baseline scan (which finishes
    near-instantly on an empty wallet). The user just doesn't
    need to wait visually.
  - Secondary nudge: a small "Receive" affordance below the
    success copy directs the user to the Receive flow if they
    want their first deposit address right now. (Receive ships in
    its own iteration; the affordance is provisional and may
    revert to just "Done" if Receive isn't yet wired up. For the
    Purse-wizard iteration, this affordance can land disabled
    with a "Receive ships in the next iteration" tooltip — same
    discipline as the rest of the dev-phase work.)
  - "Done" CTA returns to Home.
-->
