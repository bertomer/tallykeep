<!--
  Title: Mobile — Account detail · Operations tab (empty / fresh account)
  Status: validated  (Rémy greenlight 2026-05-17 closing the Account-detail-page design pass — iteration B mockup set: populated Operations, empty Operations, Settings, Remove confirm, connection-error toast)
  Date last touched: 2026-05-17
  Replaces: nothing on disk; sibling to
            mobile_account_detail_operations_populated.html.

  Design notes:
  - Same chrome as the populated state (app bar, status card,
    hero, action row, tab strip, bottom nav). The only difference
    is the activity-list region: it renders a sober empty-state
    panel instead of ledger rows. Single source of truth for
    layout = the populated mockup; this file's structural shape
    must match.
  - **When this state shows.** Fresh Kraken account just connected
    via the Add Account wizard, or any Account whose `Ledgers`
    feed has zero entries in the rolling 90-day observation
    window. (Older accounts that *had* activity but have been
    quiet for 90+ days fall under the same empty state — the
    feed only shows what the observation cursor has fetched;
    there's no "load all history since the account was opened"
    surface in v1.)
  - **Balance state.** The mockup shows zero balance (4 zeros)
    because the most realistic "empty Operations" case is the
    just-connected-no-activity account. If the user's Kraken
    balance is non-zero but happens to have no recent ledger
    entries (rare but possible — e.g. a balance from before the
    observation window), the same empty-activity panel renders
    underneath whatever balance is observed.
  - **Other-assets row hidden.** Cap-and-overflow row is hidden
    when zero non-BTC balances. Matches the wizard's Step 2
    parseback rule.
  - **Empty-state copy — sober, informative.** Title states the
    fact ("No activity yet"); sub-line sets the expectation
    (activity will surface as Kraken reports it). Mirrors the
    Home-empty state's tone — no marketing-coded language, no
    "Get started!" call to action. The user has just landed
    here; the page tells them what's true and stops.
  - **No empty-state illustration.** Per the "no kind-icons"
    rule from the Step 2 follow-up, the page doesn't reach for a
    generic "empty list" icon either — the icon vocabulary for
    activity hasn't been enumerated yet. Text-only empty state.
  - **Action row stays active.** Deposit and Withdraw buttons
    remain functional from the empty state — the user might
    want to deposit BTC to fund a future sell, or withdraw a
    pre-existing balance that pre-dates the observation window.
    No reason to grey them out.
  - **Pull-to-refresh and status-card-tap-to-refresh remain
    active.** Same behaviour as the populated state.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TallyKeep — Mobile — Account detail · Operations (empty)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared/tokens.css">
<link rel="stylesheet" href="_shared/shell.css">
<style>
  .phone-screen { background: var(--color-bg); }

  /* ---------- App bar ---------- */
  .app-bar {
    height: var(--mobile-app-bar);
    flex-shrink: 0;
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    align-items: center;
    padding: 0 var(--space-2);
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
  }
  .app-bar .back-btn {
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 0;
    border-radius: var(--radius-md);
    color: var(--color-text);
    cursor: pointer;
    justify-self: start;
    margin-left: var(--space-2);
  }
  .app-bar .back-btn:hover { background: var(--color-bg); }
  .app-bar .back-btn svg {
    width: 22px; height: 22px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .app-bar-title {
    text-align: center;
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ---------- Scroll area ---------- */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
  }

  /* ---------- Status card ---------- */
  .status-card {
    margin: var(--space-3) var(--space-4) 0;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-left: 4px solid var(--color-holding-account);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    display: flex;
    flex-direction: column;
    gap: 2px;
    cursor: pointer;
    text-align: left;
    width: calc(100% - var(--space-4) * 2);
    font-family: inherit;
  }
  .status-card:hover { background: var(--color-surface-raised); }
  .status-provider {
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
  }
  .status-line {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    line-height: 1.4;
  }
  .status-sep { color: var(--color-text-dim); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .status-dot--healthy { background: var(--color-success); }
  .status-state {
    color: var(--color-text);
    font-weight: var(--font-weight-medium);
  }

  /* ---------- Hero ---------- */
  .detail-hero {
    padding: var(--space-5) var(--space-4) var(--space-3);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }
  .hero-amount-line {
    display: flex;
    align-items: baseline;
    gap: var(--space-2);
  }
  .hero-amount {
    font-family: var(--font-sans);
    font-size: 36px;
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .hero-unit-label {
    font-size: var(--font-size-md);
    color: var(--color-text-muted);
    font-weight: var(--font-weight-medium);
    line-height: 1;
  }
  .unit-toggle {
    background: transparent; border: 0;
    padding: 0 0 0 2px; margin: 0;
    font-size: 0.7em; vertical-align: super; line-height: 1;
    color: var(--color-text-muted);
    cursor: pointer; font-family: inherit;
  }

  /* ---------- Action row ---------- */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-3);
    padding: var(--space-2) var(--space-4) var(--space-4);
  }
  .action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-4);
    background: var(--color-primary-soft);
    border: 0;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-semibold);
    color: var(--color-primary-strong);
    cursor: pointer;
  }
  .action-btn:hover { background: #c9e3d9; }
  .action-btn svg {
    width: 18px; height: 18px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ---------- Tab strip ---------- */
  .tab-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--color-bg);
    border-top: 1px solid var(--color-border);
    border-bottom: 1px solid var(--color-border);
  }
  .tab {
    padding: var(--space-3) 0;
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    color: var(--color-text-muted);
    cursor: pointer;
    position: relative;
  }
  .tab:hover { color: var(--color-text); }
  .tab--active {
    color: var(--color-text);
    font-weight: var(--font-weight-semibold);
  }
  .tab--active::after {
    content: '';
    position: absolute;
    left: 12%;
    right: 12%;
    bottom: -1px;
    height: 2px;
    background: var(--color-primary);
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  }

  /* ---------- Empty state ---------- */
  .activity-empty {
    background: var(--color-surface);
    padding: var(--space-7) var(--space-5);
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    align-items: center;
  }
  .activity-empty .title {
    font-size: var(--font-size-base);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
  }
  .activity-empty .sub {
    font-size: var(--font-size-sm);
    color: var(--color-text-muted);
    line-height: var(--line-height-default);
    max-width: 280px;
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav {
    height: var(--mobile-bottom-nav);
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--color-surface);
    border-top: 1px solid var(--color-border);
  }
  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    padding: var(--space-2) 0;
    font-size: 10px;
    color: var(--color-text-dim);
    background: transparent; border: 0; cursor: pointer;
  }
  .nav-item .nav-ico {
    width: 22px; height: 22px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .nav-item.active {
    color: var(--color-primary-strong);
    font-weight: var(--font-weight-semibold);
    position: relative;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--color-primary);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }
  .nav-item.enabled-inactive { color: var(--color-text-muted); }
  .nav-item.disabled { color: var(--color-text-dim); opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="mockup-meta">
  <strong>Mobile — Account detail · Operations (empty / fresh account)</strong> ·
  <span class="status-validated">validated</span> ·
  2026-05-17 · 360×800
</div>

<div class="phone-frame">
  <div class="phone-screen">

    <div class="app-bar">
      <button class="back-btn" aria-label="Back to Holdings">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="15 6 9 12 15 18"/>
        </svg>
      </button>
      <div class="app-bar-title">Kraken account</div>
      <div></div>
    </div>

    <div class="scroll-area">

      <button class="status-card" type="button" aria-label="Account connection status — tap to refresh">
        <span class="status-provider">Kraken</span>
        <span class="status-line">
          <span class="status-dot status-dot--healthy" aria-hidden="true"></span>
          <span class="status-state">Connected</span>
          <span class="status-sep">·</span>
          <span>Updated just now</span>
        </span>
      </button>

      <div class="detail-hero">
        <div class="hero-amount-line">
          <span class="hero-amount">0</span>
          <span class="hero-unit-label">sats<button class="unit-toggle" aria-label="Cycle unit: sats / BTC">↻</button></span>
        </div>
        <!-- Other-assets row hidden: zero non-BTC balances -->
      </div>

      <div class="action-row">
        <button class="action-btn" type="button" aria-label="Deposit BTC to this Account">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="12" width="16" height="9" rx="1.5"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
            <polyline points="8 11 12 15 16 11"/>
          </svg>
          Deposit
        </button>
        <button class="action-btn" type="button" aria-label="Withdraw BTC from this Account">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="12" width="16" height="9" rx="1.5"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
            <polyline points="8 7 12 3 16 7"/>
          </svg>
          Withdraw
        </button>
      </div>

      <div class="tab-strip" role="tablist">
        <button class="tab tab--active" role="tab" aria-selected="true">Operations</button>
        <button class="tab" role="tab" aria-selected="false">Settings</button>
      </div>

      <!-- Empty state -->
      <div class="activity-empty" role="status">
        <div class="title">No activity yet</div>
        <div class="sub">Your deposits, withdrawals, and trades will surface here as they happen on Kraken.</div>
      </div>

    </div>

    <div class="bottom-nav">
      <button class="nav-item active">
        <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M 3 11 L 12 4 L 21 11"/>
          <polyline points="5 10 5 20 19 20 19 10"/>
        </svg>
        Home
      </button>
      <button class="nav-item enabled-inactive">
        <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="4 12 9 17 20 6"/>
        </svg>
        Activity
      </button>
      <button class="nav-item enabled-inactive">
        <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M 12 2 L 12 6 M 12 18 L 12 22 M 4 12 L 8 12 M 16 12 L 20 12 M 6.34 6.34 L 8.46 8.46 M 15.54 15.54 L 17.66 17.66 M 6.34 17.66 L 8.46 15.54 M 15.54 8.46 L 17.66 6.34"/>
        </svg>
        Settings
      </button>
      <button class="nav-item disabled">
        <svg class="nav-ico" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Help
      </button>
    </div>

  </div>
</div>

</body>
</html>
