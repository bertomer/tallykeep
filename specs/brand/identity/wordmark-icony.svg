<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 145" aria-label="tallykeep">
  <title>TallyKeep — icon-y wordmark (display tier, 92 px)</title>
  <desc>Wordmark variant with the canonical icon embedded between "tall" and "keep". Manrope 600, letter-spacing -2. Display-tier sizing. Carvings filled with #FAFAF7 (page background) so the icon reads as a cut into the surface.</desc>
  <text x="0" y="92"
        font-family="Manrope, system-ui, sans-serif"
        font-weight="600"
        font-size="92"
        letter-spacing="-2"
        fill="#1A1A1A">tall</text>
  <svg x="143" y="42" width="76" height="84" viewBox="36.43 27.79 131.9 146.43">
    <defs>
      <clipPath id="wm-stock-clip">
        <path d="M 168.33 42.19 L 54.27 174.22 L 36.43 139.77 L 54.47 118.86 L 65.07 128.02 L 151.67 27.81 Z"/>
      </clipPath>
      <clipPath id="wm-foil-clip">
        <polygon points="40.68,42.21 79.68,87.21 96.32,72.79 57.32,27.79"/>
      </clipPath>
    </defs>
    <path d="M 168.33 42.19 L 54.27 174.22 L 36.43 139.77 L 54.47 118.86 L 65.07 128.02 L 151.67 27.81 Z" fill="#A88554"/>
    <polygon points="40.68,42.21 79.68,87.21 96.32,72.79 57.32,27.79" fill="#A88554"/>
    <g stroke="#6F5638" stroke-width="1.4" stroke-linecap="butt" opacity="0.6">
      <line x1="163.79" y1="38.27" x2="46.07" y2="174.53" clip-path="url(#wm-stock-clip)"/>
      <line x1="156.22" y1="31.73" x2="38.50" y2="167.99" clip-path="url(#wm-stock-clip)"/>
      <line x1="45.22"  y1="38.27" x2="84.52" y2="83.64"  clip-path="url(#wm-foil-clip)"/>
      <line x1="52.78"  y1="31.73" x2="92.08" y2="77.09"  clip-path="url(#wm-foil-clip)"/>
    </g>
    <!-- In the icon-y wordmark, carvings are filled with the page bg (#FAFAF7) so they read as cuts into the surface, not into a separate cream container. -->
    <circle cx="53.76" cy="147.31" r="2.8" fill="#FAFAF7"/>
    <polygon points="-3,12 3,12 2,5 -2,5"     fill="#FAFAF7" transform="translate(147 50) rotate(130.82)"/>
    <polygon points="-4,12 4,12 2,4 -2,4"     fill="#FAFAF7" transform="translate(140 58) rotate(130.82)"/>
    <polygon points="-3,12 3,12 2,5 -2,5"     fill="#FAFAF7" transform="translate(133 66) rotate(130.82)"/>
    <polygon points="-3,-12 3,-12 2,-5 -2,-5" fill="#FAFAF7" transform="translate(62 50)  rotate(49.18)"/>
    <polygon points="-4,-12 4,-12 2,-4 -2,-4" fill="#FAFAF7" transform="translate(69 58)  rotate(49.18)"/>
    <polygon points="-3,-12 3,-12 2,-5 -2,-5" fill="#FAFAF7" transform="translate(76 66)  rotate(49.18)"/>
  </svg>
  <text x="228" y="92"
        font-family="Manrope, system-ui, sans-serif"
        font-weight="600"
        font-size="92"
        letter-spacing="-2"
        fill="#1A1A1A">keep</text>
</svg>
