components:
  schemas:
    AccountCreate:
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
          title: Name
        description:
          anyOf:
          - type: string
            maxLength: 2000
          - type: 'null'
          title: Description
        purpose:
          $ref: '#/components/schemas/Purpose'
        declared_security:
          $ref: '#/components/schemas/SecurityClaimInput'
        display_color:
          type: string
          pattern: ^#[0-9A-Fa-f]{6}$
          title: Display Color
          default: '#000000'
        display_order:
          type: integer
          minimum: 0.0
          title: Display Order
          default: 0
        custodial_provider:
          $ref: '#/components/schemas/CustodialProviderInput'
      additionalProperties: false
      type: object
      required:
      - name
      - purpose
      - declared_security
      - custodial_provider
      title: AccountCreate
    AddressListResponse:
      properties:
        addresses:
          items:
            $ref: '#/components/schemas/AddressResponse'
          type: array
          title: Addresses
      type: object
      required:
      - addresses
      title: AddressListResponse
    AddressOut:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        address:
          type: string
          title: Address
        derivation_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Derivation Path
        derivation_index:
          anyOf:
          - type: integer
          - type: 'null'
          title: Derivation Index
        is_change:
          type: boolean
          title: Is Change
        label:
          anyOf:
          - type: string
          - type: 'null'
          title: Label
        first_seen_height:
          anyOf:
          - type: integer
          - type: 'null'
          title: First Seen Height
      type: object
      required:
      - id
      - address
      - derivation_path
      - derivation_index
      - is_change
      - label
      - first_seen_height
      title: AddressOut
    AddressPatch:
      properties:
        label:
          anyOf:
          - type: string
          - type: 'null'
          title: Label
      type: object
      title: AddressPatch
    AddressResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        descriptor_id:
          type: string
          format: uuid
          title: Descriptor Id
        address:
          type: string
          title: Address
        derivation_path:
          type: string
          title: Derivation Path
        is_change:
          type: boolean
          title: Is Change
        derivation_index:
          type: integer
          title: Derivation Index
        label:
          anyOf:
          - type: string
          - type: 'null'
          title: Label
        first_seen_height:
          anyOf:
          - type: integer
          - type: 'null'
          title: First Seen Height
        is_reused:
          type: boolean
          title: Is Reused
      type: object
      required:
      - id
      - descriptor_id
      - address
      - derivation_path
      - is_change
      - derivation_index
      - label
      - first_seen_height
      - is_reused
      title: AddressResponse
    AddressType:
      type: string
      enum:
      - legacy
      - nested_segwit
      - native_segwit
      - taproot
      - p2sh_multisig
      - p2wsh
      - p2sh_p2wsh
      title: AddressType
    AnalysisConfiguration:
      properties:
        recompute_interval_minutes:
          anyOf:
          - type: integer
            minimum: 1.0
          - type: 'null'
          title: Recompute Interval Minutes
      additionalProperties: false
      type: object
      title: AnalysisConfiguration
    AttachDescriptorRequest:
      properties:
        holding_id:
          type: string
          format: uuid
          title: Holding Id
        descriptor:
          $ref: '#/components/schemas/DescriptorInput'
      additionalProperties: false
      type: object
      required:
      - holding_id
      - descriptor
      title: AttachDescriptorRequest
    BalanceOut:
      properties:
        provider_id:
          type: string
          format: uuid
          title: Provider Id
        balance_sats:
          type: integer
          title: Balance Sats
        last_polled_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Polled At
      type: object
      required:
      - provider_id
      - balance_sats
      - last_polled_at
      title: BalanceOut
    BitcoindConfiguration:
      properties:
        rpc_host:
          anyOf:
          - type: string
          - type: 'null'
          title: Rpc Host
        rpc_port:
          anyOf:
          - type: integer
            maximum: 65535.0
            minimum: 1.0
          - type: 'null'
          title: Rpc Port
        zmq_block_endpoint:
          anyOf:
          - type: string
          - type: 'null'
          title: Zmq Block Endpoint
        zmq_tx_endpoint:
          anyOf:
          - type: string
          - type: 'null'
          title: Zmq Tx Endpoint
      additionalProperties: false
      type: object
      title: BitcoindConfiguration
    BlueprintSummary:
      properties:
        address_reuse_count:
          type: integer
          title: Address Reuse Count
        dust_utxo_count:
