openapi: 3.1.0
info:
  title: TallyKeep
  version: 0.1.0-dev
paths:
  /api/v1/health:
    get:
      tags:
      - health
      summary: Get Health
      operationId: get_health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/unlock:
    post:
      tags:
      - unlock
      summary: Post Unlock
      operationId: post_unlock_api_v1_unlock_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnlockResponse'
        '401':
          description: Bad passphrase
        '503':
          description: "Crypto parameters not initialized â\x80\x94 first run required"
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/unlock/initialize:
    post:
      tags:
      - unlock
      summary: Post Unlock Initialize
      operationId: post_unlock_initialize_api_v1_unlock_initialize_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitializeResponse'
        '409':
          description: Already initialized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/server/info:
    get:
      tags:
      - server
      summary: Get Server Info
      operationId: get_server_info_api_v1_server_info_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfoResponse'
  /api/v1/pairing/issue:
    post:
      tags:
      - pairing
      summary: Post Pairing Issue
      description: 'Generate a one-time pairing token.


        Called by the server operator (CLI or future desktop UI) to display as a QR

        or plain token. Exempt from auth because it''s a server-admin operation that

        runs before any device is paired (or when adding a second device later).'
      operationId: post_pairing_issue_api_v1_pairing_issue_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairingIssueResponse'
  /api/v1/pairing/redeem:
    post:
      tags:
      - pairing
      summary: Post Pairing Redeem
      description: 'Exchange a one-time pairing token for a long-lived device credential.


        Phone-side endpoint. After this call the phone stores the returned

        device_credential via NativeBridge.secureStorage. The credential is

        returned exactly once; if lost, re-pair.'
      operationId: post_pairing_redeem_api_v1_pairing_redeem_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairingRedeemRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairingRedeemResponse'
        '401':
          description: Invalid, expired, or already-redeemed token
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/passphrase-validate:
    post:
      tags:
      - auth
      summary: Post Passphrase Validate
      description: 'Phone-side passphrase validation for fallback unlock.


        The phone forwards the typed passphrase; this endpoint validates against

        the server''s Argon2id-derived canary. Rate-limited per ADR-0008.'
      operationId: post_passphrase_validate_api_v1_auth_passphrase_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassphraseValidateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassphraseValidateResponse'
        '401':
          description: Wrong passphrase
        '429':
          description: Too many failed attempts
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/devices/{device_id}:
    delete:
      tags:
      - auth
      summary: Delete Device
      description: 'Revoke a paired device credential.


        After revocation, subsequent requests from that device return 401.

        The device-list UI (desktop iteration) calls this; the endpoint ships now

        so the backend contract is in place.'
      operationId: delete_device_api_v1_devices__device_id__delete
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Device Id
      responses:
        '204':
          description: Successful Response
        '404':
          description: Device not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/profile:
    get:
      tags:
      - profile
      summary: Get Profile
      operationId: get_profile_api_v1_profile_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
    patch:
      tags:
      - profile
      summary: Patch Profile
      operationId: patch_profile_api_v1_profile_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/feature-flags:
    get:
      tags:
      - profile
      summary: Get Feature Flags
      operationId: get_feature_flags_api_v1_feature_flags_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureFlagsResponse'
  /api/v1/configuration:
    get:
      tags:
      - configuration
      summary: Get Configuration
      operationId: get_configuration_api_v1_configuration_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationResponse'
    patch:
      tags:
      - configuration
      summary: Patch Configuration
      operationId: patch_configuration_api_v1_configuration_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigurationUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/purse:
    post:
      tags:
      - holdings
      summary: Create Purse
      operationId: create_purse_api_v1_holdings_purse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurseCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/strongbox:
    post:
      tags:
      - holdings
      summary: Create Strongbox
      operationId: create_strongbox_api_v1_holdings_strongbox_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrongboxCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/vault:
    post:
      tags:
      - holdings
      summary: Create Vault
      operationId: create_vault_api_v1_holdings_vault_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/account:
    post:
      tags:
      - holdings
      summary: Create Account Holding
      operationId: create_account_holding_api_v1_holdings_account_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings:
    get:
      tags:
      - holdings
      summary: List Holdings
      operationId: list_holdings_api_v1_holdings_get
      parameters:
      - name: holding_type
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/HoldingType'
          - type: 'null'
          title: Holding Type
      - name: purpose
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Purpose'
          - type: 'null'
          title: Purpose
      - name: include_archived
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Archived
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HoldingResponse'
                title: Response List Holdings Api V1 Holdings Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/summary/global:
    get:
      tags:
      - holdings
      summary: Global Holdings Summary
      description: "Fortune view: per-Holding summary plus cross-Holding rollups.\n\
        \nSpec module 05: \"the global view always shows the per-Holding\nbreakdown\
        \ alongside the total. No silent consolidation.\" We honour\nthat â\x80\x94\
        \ the response includes the full summary list, not just the\ntotals.\n\nHoldings\
        \ are sorted by custody tier (Account â\x86\x92 Purse â\x86\x92 Strongbox\
        \ â\x86\x92 Vault),\nthen by display_order within each tier. Each entry carries:\n\
        \  - meta: type-specific label (provider name / device label / m-of-n)\n \
        \ - scan_status: \"n/a\" | \"scanning\" | \"scanned\""
      operationId: global_holdings_summary_api_v1_holdings_summary_global_get
      parameters:
      - name: include_archived
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Archived
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/{holding_id}/summary:
    get:
      tags:
      - holdings
      summary: Holding Summary
      description: 'Per-Holding deep summary: balance + descriptor/UTXO counts +

        observable security analysis.


        Returns 404 when the holding doesn''t exist.'
      operationId: holding_summary_api_v1_holdings__holding_id__summary_get
      parameters:
      - name: holding_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Holding Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/{holding_id}:
    get:
      tags:
      - holdings
      summary: Get Holding
      operationId: get_holding_api_v1_holdings__holding_id__get
      parameters:
      - name: holding_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Holding Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - holdings
      summary: Patch Holding
      operationId: patch_holding_api_v1_holdings__holding_id__patch
      parameters:
      - name: holding_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Holding Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HoldingUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/{holding_id}/archive:
    post:
      tags:
      - holdings
      summary: Archive Holding
      operationId: archive_holding_api_v1_holdings__holding_id__archive_post
      parameters:
      - name: holding_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Holding Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/holdings/{holding_id}/change-type:
    post:
      tags:
      - holdings
      summary: Change Holding Type
      operationId: change_holding_type_api_v1_holdings__holding_id__change_type_post
      parameters:
      - name: holding_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Holding Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeTypeRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors/validate:
    post:
      tags:
      - descriptors
      summary: "Validate a BIP 380 descriptor â\x80\x94 pure parser, no state mutation."
      description: 'Validate a descriptor expression and return its parsed properties.


        Accepts single-key and multisig BIP 380 descriptors.

        Returns a typed 422 error when given a bare bitcoin address instead of

        a descriptor (error_code: SINGLE_ADDRESS_INPUT).'
      operationId: validate_descriptor_api_v1_descriptors_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateDescriptorRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateDescriptorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors:
    get:
      tags:
      - descriptors
      summary: List Descriptors
      operationId: list_descriptors_api_v1_descriptors_get
      parameters:
      - name: holding_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Holding Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DescriptorResponse'
                title: Response List Descriptors Api V1 Descriptors Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - descriptors
      summary: Attach Descriptor
      description: Attach a new Descriptor + its derived addresses to an existing
        Holding.
      operationId: attach_descriptor_api_v1_descriptors_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachDescriptorRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescriptorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors/{descriptor_id}:
    get:
      tags:
      - descriptors
      summary: Get Descriptor
      operationId: get_descriptor_api_v1_descriptors__descriptor_id__get
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescriptorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - descriptors
      summary: Patch Descriptor
      operationId: patch_descriptor_api_v1_descriptors__descriptor_id__patch
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescriptorPatch'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescriptorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - descriptors
      summary: Delete Descriptor
      description: 'Hard-delete a descriptor.


        Refuses if any addresses still reference it. Address cascade-cleanup is

        M5 territory; for now archive the owning holding instead of deleting the

        descriptor.'
      operationId: delete_descriptor_api_v1_descriptors__descriptor_id__delete
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors/{descriptor_id}/addresses:
    get:
      tags:
      - descriptors
      summary: List Descriptor Addresses
      operationId: list_descriptor_addresses_api_v1_descriptors__descriptor_id__addresses_get
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      - name: is_change
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Change
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors/{descriptor_id}/addresses/next-receiving:
    post:
      tags:
      - descriptors
      summary: Next Receiving Address
      operationId: next_receiving_address_api_v1_descriptors__descriptor_id__addresses_next_receiving_post
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextReceivingAddressResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors/{descriptor_id}/rescan:
    post:
      tags:
      - descriptors
      summary: Rescan Descriptor
      description: "Run a one-shot scan of bitcoind's UTXO set against this descriptor.\n\
        \nPersists newly-discovered UTXOs, the OnChainTransactions that produced\n\
        them, and a LedgerEntry per UTXO with `direction=INCOMING`. Re-runs are\n\
        idempotent (UTXOs upsert by (txid, vout); LedgerEntries de-dupe per\nholding\
        \ by source_reference).\n\nSynchronous in M5.2 â\x80\x94 moved to a job queue\
        \ in M5.3 once we wire the\nworker process for the live ZMQ listener."
      operationId: rescan_descriptor_api_v1_descriptors__descriptor_id__rescan_post
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RescanResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors/{descriptor_id}/utxos:
    get:
      tags:
      - descriptors
      summary: List Descriptor Utxos
      operationId: list_descriptor_utxos_api_v1_descriptors__descriptor_id__utxos_get
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      - name: only_unspent
        in: query
        required: false
        schema:
          type: boolean
          default: true
          title: Only Unspent
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescriptorUtxosResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/descriptors/{descriptor_id}/balance:
    get:
      tags:
      - descriptors
      summary: Descriptor Balance
      operationId: descriptor_balance_api_v1_descriptors__descriptor_id__balance_get
      parameters:
      - name: descriptor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Descriptor Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescriptorBalanceResponse'
        '422':
          description: Validation Error
          content:
            application/json:
