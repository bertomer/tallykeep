  /api/v1/analysis/holding/{holding_id}/blueprint:
    get:
      tags:
      - analysis
      summary: Holding Blueprint
      description: 'Aggregate hygiene rollups + per-flag recommendations for a Holding.


        Walks every UTXO attached to every Descriptor of the Holding, sums the

        per-flag counts, and emits one recommendation per flag *kind* present

        (we don''t repeat the same recommendation for every UTXO). Severity

        follows spec module 05.'
      operationId: holding_blueprint_api_v1_analysis_holding__holding_id__blueprint_get
      parameters:
      - name: holding_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Holding Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HoldingBlueprintResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
