        \nCurrently a stub; the per-UTXO hygiene endpoint already covers the\nflag\
        \ list + recommendations. v2 will add per-flag historic context\n(when did\
        \ the address first see reuse, what was the fee rate when DUST\nwas computed,\
        \ etc.) â\x80\x94 not load-bearing for v1."
      operationId: utxo_blueprint_api_v1_analysis_utxo__utxo_id__get
