# TallyKeep — local development stack.
#
# Per spec module 01 / module 10:
#   - All host port mappings bind to 127.0.0.1 only. The app has no public surface in v1.
#   - Service-to-service traffic stays on the internal `tallykeep` network.
#   - bitcoind runs in regtest mode for development; testnet/mainnet are a separate work
#     item per CONTEXT.md.

name: tallykeep

networks:
  tallykeep:
    name: tallykeep
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  bitcoind-data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: tallykeep-postgres
    environment:
      POSTGRES_USER: tallykeep
      POSTGRES_PASSWORD: tallykeep_dev
      POSTGRES_DB: tallykeep
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks: [tallykeep]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tallykeep -d tallykeep"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tallykeep-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks: [tallykeep]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bitcoind:
    # Pinned to a known-good Bitcoin Core release. Spec module 13 says minimum is 26.0.
    image: lncm/bitcoind:v27.0
    container_name: tallykeep-bitcoind
    command:
      - -regtest=1
      - -server=1
      - -txindex=1
      - -rpcuser=tallykeep
      - -rpcpassword=tallykeep_dev
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
      - -zmqpubhashblock=tcp://0.0.0.0:28334
      - -fallbackfee=0.0002
    volumes:
      - bitcoind-data:/data/.bitcoin
    ports:
      # regtest RPC is 18443; only exposed to localhost.
      - "127.0.0.1:18443:18443"
      - "127.0.0.1:28332:28332"
      - "127.0.0.1:28333:28333"
      - "127.0.0.1:28334:28334"
    networks: [tallykeep]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: tallykeep-backend
    environment:
      TALLYKEEP_ENVIRONMENT: development
      TALLYKEEP_API_HOST: 0.0.0.0
      TALLYKEEP_API_PORT: 8000
      TALLYKEEP_DATABASE_URL: postgresql+psycopg://tallykeep:tallykeep_dev@postgres:5432/tallykeep
      TALLYKEEP_REDIS_URL: redis://redis:6379/0
      TALLYKEEP_BITCOIND_RPC_URL: http://tallykeep:tallykeep_dev@bitcoind:18443
      TALLYKEEP_BITCOIND_ZMQ_BLOCK_ENDPOINT: tcp://bitcoind:28332
      TALLYKEEP_BITCOIND_ZMQ_TX_ENDPOINT: tcp://bitcoind:28333
    # Live source mount: edits on the host appear in the container without rebuild.
    # Read-only ensures container changes do not leak back to the host.
    volumes:
      - ./backend/tallykeep:/app/tallykeep:ro
      - ./backend/tests:/app/tests:ro
    ports:
      - "127.0.0.1:8000:8000"
    networks: [tallykeep]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bitcoind:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    command: ["uvicorn", "tallykeep.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    container_name: tallykeep-worker
    environment:
      TALLYKEEP_ENVIRONMENT: development
      TALLYKEEP_DATABASE_URL: postgresql+psycopg://tallykeep:tallykeep_dev@postgres:5432/tallykeep
      TALLYKEEP_REDIS_URL: redis://redis:6379/0
      TALLYKEEP_BITCOIND_RPC_URL: http://tallykeep:tallykeep_dev@bitcoind:18443
      TALLYKEEP_BITCOIND_ZMQ_BLOCK_ENDPOINT: tcp://bitcoind:28332
      TALLYKEEP_BITCOIND_ZMQ_TX_ENDPOINT: tcp://bitcoind:28333
    volumes:
      - ./backend/tallykeep:/app/tallykeep:ro
      - ./backend/tests:/app/tests:ro
    networks: [tallykeep]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "tallykeep.worker"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: tallykeep-frontend
    ports:
      - "127.0.0.1:8080:8080"
    networks: [tallykeep]
    depends_on:
      - backend
    restart: unless-stopped
