worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;
  sendfile on;
  keepalive_timeout 65;

  # Per spec module 01: backend talks to frontend via HTTP and SSE.
  # nginx proxies /api/* to the backend so the frontend can call same-origin.
  upstream backend {
    server backend:8000;
  }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
      proxy_pass http://backend/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # SSE: disable buffering and proxy timeouts so events flow through promptly.
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 24h;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
